<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SteelProp — 成分性能预测</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <div>
          <p class="eyebrow">Composition → Property → Thermo</p>
          <h1>钢铁成分性能预测</h1>
          <p class="subtitle">输入化学成分，在浏览器中直接运行模型并输出力学/物理性能；连接后端 API 后还可启用 DeepSeek 辅助解释。</p>
        </div>
        <div class="status" id="status-box">检查模型状态…</div>
      </header>

      <main class="layout">
        <section class="panel input-panel">
          <div class="panel-head">
            <h2>输入</h2>
            <button type="button" class="ghost" id="preset-low-alloy">载入低合金示例</button>
          </div>

          <label class="field">
            <span>钢种类型</span>
            <select id="material-subclass">
              <option value="alloy_steel">合金钢</option>
              <option value="carbon_steel">碳钢</option>
              <option value="stainless_steel">不锈钢</option>
              <option value="tool_steel">工具钢</option>
              <option value="cast_iron">铸铁</option>
            </select>
          </label>

          <div class="grid-elements" id="composition-grid"></div>

          <label class="field">
            <span>工艺/热处理描述（可选）</span>
            <textarea id="process-text" rows="3" placeholder="例如：900C 淬火 + 600C 回火"></textarea>
          </label>

          <div class="actions">
            <button type="button" class="primary" id="predict-btn">开始预测</button>
          </div>

          <div class="demo-key">
            <label class="field">
              <span>DeepSeek 演示 API Key（本次浏览器会话）</span>
              <input type="password" id="deepseek-key" autocomplete="off" placeholder="粘贴后点保存；不会写入 GitHub" />
            </label>
            <div class="actions">
              <button type="button" class="ghost" id="save-deepseek-key">保存</button>
              <button type="button" class="ghost" id="clear-deepseek-key">清除</button>
            </div>
            <p class="key-status" id="deepseek-key-status">未启用 DeepSeek 辅助解释</p>
          </div>
        </section>

        <section class="panel results-panel">
          <div class="panel-head">
            <h2>预测结果</h2>
          </div>
          <div id="warnings" class="warnings hidden"></div>

          <div class="result-block">
            <h3>力学性能</h3>
            <div class="metric-grid" id="mechanical-results">
              <p class="placeholder">填写成分后点击「开始预测」</p>
            </div>
          </div>

          <div class="result-block">
            <h3>物理性能</h3>
            <div class="metric-grid" id="physical-results">
              <p class="placeholder">填写成分后点击「开始预测」</p>
            </div>
          </div>

          <div class="result-block">
            <h3>机理解释</h3>
            <div id="composition-explain" class="explain-box placeholder">等待输入…</div>
            <div id="thermo-explain" class="explain-box thermo hidden"></div>
            <div id="ai-explain" class="explain-box ai hidden"></div>
            <p class="footnote">GitHub Pages 版在访问者浏览器本地运行模型；热力学结果来自公开精简的相近材料预计算参考，非实时 Thermo-Calc。</p>
          </div>
        </section>
      </main>
    </div>
    <script src="./config.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SteelProp — 成分性能预测</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <div>
          <p class="eyebrow">Composition → Property → Thermo</p>
          <h1>钢铁成分性能预测</h1>
          <p class="subtitle">输入化学成分；连接 Python 模型 API 后可输出力学/物理性能，无 API 时提供 GitHub Pages 静态成分机理说明。</p>
        </div>
        <div class="status" id="status-box">检查模型状态…</div>
      </header>

      <main class="layout">
        <section class="panel input-panel">
          <div class="panel-head">
            <h2>输入</h2>
            <button type="button" class="ghost" id="preset-low-alloy">载入低合金示例</button>
          </div>

          <label class="field">
            <span>钢种类型</span>
            <select id="material-subclass">
              <option value="alloy_steel">合金钢</option>
              <option value="carbon_steel">碳钢</option>
              <option value="stainless_steel">不锈钢</option>
              <option value="tool_steel">工具钢</option>
              <option value="cast_iron">铸铁</option>
            </select>
          </label>

          <div class="grid-elements" id="composition-grid"></div>

          <label class="field">
            <span>工艺/热处理描述（可选）</span>
            <textarea id="process-text" rows="3" placeholder="例如：900C 淬火 + 600C 回火"></textarea>
          </label>

          <div class="actions">
            <button type="button" class="primary" id="predict-btn">开始预测</button>
          </div>
        </section>

        <section class="panel results-panel">
          <div class="panel-head">
            <h2>预测结果</h2>
          </div>
          <div id="warnings" class="warnings hidden"></div>

          <div class="result-block">
            <h3>力学性能</h3>
            <div class="metric-grid" id="mechanical-results">
              <p class="placeholder">填写成分后点击「开始预测」</p>
            </div>
          </div>

          <div class="result-block">
            <h3>物理性能</h3>
            <div class="metric-grid" id="physical-results">
              <p class="placeholder">填写成分后点击「开始预测」</p>
            </div>
          </div>

          <div class="result-block">
            <h3>机理解释</h3>
            <div id="composition-explain" class="explain-box placeholder">等待输入…</div>
            <p class="footnote">GitHub Pages 只托管静态网页；数值预测需要连接额外 API 或在本机运行。</p>
          </div>
        </section>
      </main>
    </div>
    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
